[workspace]
channels = ["conda-forge", "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge/"]
name = "x-icm"
platforms = ["linux-64"]
version = "0.1.0"


[system-requirements]
cuda = "12.4"

[tasks]

[tasks.setup_env]
depends-on = ["install_xvfb", "install_coppeliasim", "install_pyrep", "install_flash_attn"]

[tasks.install_xvfb]
cmd = """
bash -c '
if command -v xvfb-run >/dev/null 2>&1; then
    echo "xvfb is already installed."
else
    if sudo -n true 2>/dev/null; then
        sudo apt update && sudo apt install -y xvfb
    else
        apt update && apt install -y xvfb
    fi
fi
'
"""

[tasks.install_flash_attn]
cmd = """
bash -c '
version=$(python -c "import flash_attn; print(flash_attn.__version__)" 2>/dev/null)
if [ "$version" = "2.7.4.post1" ]; then
    echo "flash_attn 2.7.4.post1 is already installed."
else
    abi=$(python -c "import torch; print(torch._C._GLIBCXX_USE_CXX11_ABI)")
    if [ "$abi" = "True" ]; then
        pip install https://github.com/Dao-AILab/flash-attention/releases/download/v2.7.4.post1/flash_attn-2.7.4.post1+cu12torch2.6cxx11abiTRUE-cp311-cp311-linux_x86_64.whl
    else
        pip install https://github.com/Dao-AILab/flash-attention/releases/download/v2.7.4.post1/flash_attn-2.7.4.post1+cu12torch2.6cxx11abiFALSE-cp311-cp311-linux_x86_64.whl
    fi
fi
'
"""

[tasks.install_pyrep]
cmd = """
bash -c '
if ! python -c "import pyrep" 2>/dev/null; then
    pip install -e ./PyRep
fi  
'
"""
env = {COPPELIASIM_ROOT = "$PIXI_PROJECT_ROOT/CoppeliaSim", LD_LIBRARY_PATH = "$LD_LIBRARY_PATH:$COPPELIASIM_ROOT", QT_QPA_PLATFORM_PLUGIN_PATH = "$COPPELIASIM_ROOT"}

[tasks.install_coppeliasim]
cmd = """
bash -c '
if [ -d "CoppeliaSim" ]; then
    echo "Directory CoppeliaSim already exists. Overwrite? (y/N)"
    read -r response
    if [[ ! "$response" =~ ^[Yy]$ ]]; then
        echo "Skipping CoppeliaSim installation."
        exit 0
    fi
fi
wget https://downloads.coppeliarobotics.com/V4_1_0/CoppeliaSim_Edu_V4_1_0_Ubuntu20_04.tar.xz
tar -xf CoppeliaSim_Edu_V4_1_0_Ubuntu20_04.tar.xz
mv CoppeliaSim_Edu_V4_1_0_Ubuntu20_04 CoppeliaSim
rm CoppeliaSim_Edu_V4_1_0_Ubuntu20_04.tar.xz
'
"""

[tasks.get_seen_tasks]
cmd = """
bash -c '
mkdir -p $PIXI_PROJECT_ROOT/data
if [ -d "$PIXI_PROJECT_ROOT/data/seen_tasks" ]; then
    echo "Directory $PIXI_PROJECT_ROOT/data/seen_tasks already exists. Overwrite? (y/N)"
    read -r response
    if [[ ! "$response" =~ ^[Yy]$ ]]; then
        echo "Skipping seen_tasks download."
        exit 0
    fi
fi
curl -C - -L -o $PIXI_PROJECT_ROOT/data/seen_tasks.part_aa https://huggingface.co/datasets/Jiaming2472/AGNOSTOS/resolve/main/seen_tasks.part_aa
curl -C - -L -o $PIXI_PROJECT_ROOT/data/seen_tasks.part_ab https://huggingface.co/datasets/Jiaming2472/AGNOSTOS/resolve/main/seen_tasks.part_ab
curl -C - -L -o $PIXI_PROJECT_ROOT/data/seen_tasks.part_ac https://huggingface.co/datasets/Jiaming2472/AGNOSTOS/resolve/main/seen_tasks.part_ac
curl -C - -L -o $PIXI_PROJECT_ROOT/data/seen_tasks.part_ad https://huggingface.co/datasets/Jiaming2472/AGNOSTOS/resolve/main/seen_tasks.part_ad
curl -C - -L -o $PIXI_PROJECT_ROOT/data/seen_tasks.part_ae https://huggingface.co/datasets/Jiaming2472/AGNOSTOS/resolve/main/seen_tasks.part_ae
cat $PIXI_PROJECT_ROOT/data/seen_tasks.part_* > $PIXI_PROJECT_ROOT/data/seen_tasks.tar
md5=$(md5sum $PIXI_PROJECT_ROOT/data/seen_tasks.tar | awk '{print $1}')
if [ "$md5" != "8217d78779acfd2873d0f55849c8efcc" ]; then
    echo "MD5 mismatch for seen_tasks.tar: expected 8217d78779acfd2873d0f55849c8efcc, got $md5"
    exit 1
fi
tar -xvf $PIXI_PROJECT_ROOT/data/seen_tasks.tar -C $PIXI_PROJECT_ROOT/data/
rm $PIXI_PROJECT_ROOT/data/seen_tasks.tar $PIXI_PROJECT_ROOT/data/seen_tasks.part_*
'
"""

[tasks.get_unseen_tasks]
cmd = """
bash -c '
mkdir -p $PIXI_PROJECT_ROOT/data
if [ -d "$PIXI_PROJECT_ROOT/data/unseen_tasks" ]; then
    echo "Directory $PIXI_PROJECT_ROOT/data/unseen_tasks already exists. Overwrite? (y/N)"
    read -r response
    if [[ ! "$response" =~ ^[Yy]$ ]]; then
        echo "Skipping unseen_tasks download."
        exit 0
    fi
fi
curl -C - -L -o $PIXI_PROJECT_ROOT/data/unseen_tasks.tar https://huggingface.co/datasets/Jiaming2472/AGNOSTOS/resolve/main/unseen_tasks.tar
tar -xvf $PIXI_PROJECT_ROOT/data/unseen_tasks.tar -C $PIXI_PROJECT_ROOT/data/
rm $PIXI_PROJECT_ROOT/data/unseen_tasks.tar
'
"""

[tasks.get_model]
cmd = """
bash -c '
mkdir -p $PIXI_PROJECT_ROOT/data
if [ -d "$PIXI_PROJECT_ROOT/data/dynamics_diffusion" ]; then
    echo "Directory $PIXI_PROJECT_ROOT/data/dynamics_diffusion already exists. Overwrite? (y/N)"
    read -r response
    if [[ ! "$response" =~ ^[Yy]$ ]]; then
        echo "Skipping dynamics_diffusion download."
        exit 0
    fi
fi
curl -C - -L -o $PIXI_PROJECT_ROOT/data/dynamics_diffusion.tar https://huggingface.co/Jiaming2472/X-ICM/resolve/main/dynamics_diffusion.tar
tar -xvf $PIXI_PROJECT_ROOT/data/dynamics_diffusion.tar -C $PIXI_PROJECT_ROOT/data/
rm $PIXI_PROJECT_ROOT/data/dynamics_diffusion.tar
'
"""

[tasks.eval_xicm]
description = "Evaluate X-ICM model on unseen RLBench tasks. Args: seeds (comma-separated), episodes, modelname, num_icls, gpu_ids, ranking_method, disable_nccl"
args = [
    { arg = "seeds" },
    { arg = "episodes" },
    { arg = "modelname" },
    { arg = "num_icls" },
    { arg = "gpu_ids" },
    { arg = "ranking_method" },
    { arg = "disable_nccl", default = "false" }
]
cmd = "bash eval_scripts/eval_XICM.sh {{seeds}} {{episodes}} {{modelname}} {{num_icls}} {{gpu_ids}} {{ranking_method}} {{disable_nccl}}"

